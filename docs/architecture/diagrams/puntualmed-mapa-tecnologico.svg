<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 900" font-family="'DejaVu Sans', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="900" fill="#ffffff"/>

  <text x="460" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#1E3A8A">Mapa tecnológico — PuntualMed</text>
  <text x="460" y="64" text-anchor="middle" font-size="13" fill="#6B7280">Stack por capas (decisiones reales del proyecto)</text>

  <!-- ===== ARROWS ===== -->
  <g stroke="#6B7280" stroke-width="2" fill="none">
    <line x1="460" y1="142" x2="460" y2="180" marker-end="url(#arrow)"/>
    <line x1="460" y1="258" x2="460" y2="300" marker-end="url(#arrow)"/>
    <!-- backend -> db / storage -->
    <line x1="460" y1="394" x2="300" y2="452" marker-end="url(#arrow)"/>
    <line x1="460" y1="394" x2="620" y2="452" marker-end="url(#arrow)"/>
    <!-- db/storage -> integraciones -->
    <line x1="300" y1="538" x2="455" y2="582" marker-end="url(#arrow)"/>
    <line x1="620" y1="538" x2="465" y2="582" marker-end="url(#arrow)"/>
    <!-- integraciones -> devops -->
    <line x1="460" y1="704" x2="460" y2="744" marker-end="url(#arrow)"/>
  </g>
  <text x="520" y="284" font-size="12" fill="#6B7280">API REST · JWT</text>

  <!-- ===== 1. USUARIO ===== -->
  <rect x="300" y="82" width="320" height="60" rx="30" fill="#1E3A8A"/>
  <text x="460" y="108" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Usuario final</text>
  <text x="460" y="128" text-anchor="middle" font-size="12" fill="#cdd9f5">Paciente · Familiar de seguimiento</text>

  <!-- ===== 2. APP MOVIL ===== -->
  <rect x="250" y="180" width="420" height="78" rx="8" fill="#38BDF8"/>
  <text x="460" y="210" text-anchor="middle" font-size="18" font-weight="bold" fill="#07263b">Aplicación Móvil</text>
  <text x="460" y="234" text-anchor="middle" font-size="14" fill="#07263b">React Native + Expo · TypeScript</text>

  <!-- ===== 3. BACKEND ===== -->
  <rect x="220" y="300" width="480" height="94" rx="8" fill="#38BDF8"/>
  <text x="460" y="328" text-anchor="middle" font-size="18" font-weight="bold" fill="#07263b">Backend</text>
  <text x="460" y="352" text-anchor="middle" font-size="14" fill="#07263b">Python + FastAPI — Monolito modular</text>
  <text x="460" y="374" text-anchor="middle" font-size="13" fill="#07263b">+ Worker de tareas programadas (APScheduler)</text>

  <!-- ===== 4. DATOS / STORAGE ===== -->
  <rect x="155" y="452" width="290" height="86" rx="8" fill="#34D399"/>
  <text x="300" y="482" text-anchor="middle" font-size="16" font-weight="bold" fill="#06371f">Base de datos</text>
  <text x="300" y="506" text-anchor="middle" font-size="14" fill="#06371f">PostgreSQL</text>
  <text x="300" y="525" text-anchor="middle" font-size="12" fill="#06371f">(Supabase)</text>

  <rect x="475" y="452" width="290" height="86" rx="8" fill="#34D399"/>
  <text x="620" y="482" text-anchor="middle" font-size="16" font-weight="bold" fill="#06371f">Almacenamiento</text>
  <text x="620" y="506" text-anchor="middle" font-size="14" fill="#06371f">Supabase Storage</text>
  <text x="620" y="525" text-anchor="middle" font-size="12" fill="#06371f">(API compatible con S3)</text>

  <!-- ===== 5. INTEGRACIONES EXTERNAS ===== -->
  <rect x="130" y="582" width="660" height="122" rx="8" fill="#9CA3AF"/>
  <text x="460" y="608" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Integraciones externas</text>
  <g font-size="13" fill="#111827" text-anchor="middle">
    <rect x="150" y="624" width="300" height="32" rx="6" fill="#ffffff"/>
    <text x="300" y="645">Zhipu GLM — IA visión + texto</text>
    <rect x="470" y="624" width="300" height="32" rx="6" fill="#ffffff"/>
    <text x="620" y="645">Telegram — alertas al familiar</text>
    <rect x="150" y="662" width="300" height="32" rx="6" fill="#ffffff"/>
    <text x="300" y="683">Expo Push — recordatorios</text>
    <rect x="470" y="662" width="300" height="32" rx="6" fill="#ffffff"/>
    <text x="620" y="683">Supabase Auth — login con Google</text>
  </g>

  <!-- ===== 6. DEVOPS Y CALIDAD ===== -->
  <rect x="200" y="744" width="520" height="112" rx="8" fill="#1E3A8A"/>
  <text x="460" y="770" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">DevOps y Calidad</text>
  <g font-size="13" fill="#1E3A8A" text-anchor="middle">
    <rect x="222" y="788" width="150" height="48" rx="6" fill="#ffffff"/>
    <text x="297" y="810">GitHub</text>
    <text x="297" y="826" font-size="11" fill="#6B7280">control de versiones</text>
    <rect x="385" y="788" width="150" height="48" rx="6" fill="#ffffff"/>
    <text x="460" y="810">GitHub Actions</text>
    <text x="460" y="826" font-size="11" fill="#6B7280">CI/CD</text>
    <rect x="548" y="788" width="150" height="48" rx="6" fill="#ffffff"/>
    <text x="623" y="810">Docker</text>
    <text x="623" y="826" font-size="11" fill="#6B7280">contenedores</text>
  </g>
</svg>
